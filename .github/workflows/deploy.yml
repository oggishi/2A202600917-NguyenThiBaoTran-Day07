name: CI / Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← opt-in Node 24 runtime for all actions

jobs:
  # ───────────────────────────────────────────────
  # Job 1: Test & Build
  # ───────────────────────────────────────────────
  build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: rag-ui/package.json

      - name: Install dependencies
        working-directory: rag-ui
        run: npm ci

      - name: Build React app
        working-directory: rag-ui
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rag-ui/build

  # ───────────────────────────────────────────────
  # Job 2: Deploy (push to main only)
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4